task: "classification"
label: "is_win"

model:
  name: "value_blend"
  params:
    alpha_weight: 0.0
    alpha_scale: 1.5
    roi_weight: 0.12
    roi_scale: 3.0
    market_blend_weight: 0.97
    odds_column: "odds"
    alpha_positive_only: false
    roi_positive_only: false

components:
  win: "configs/model_catboost_win_high_coverage_diag_local_nankan_value_blend_bootstrap.yaml"
  roi: "configs/model_lightgbm_roi_high_coverage_diag_local_nankan_value_blend_bootstrap.yaml"

evaluation:
  leakage_audit:
    enabled: true
  policy:
    selection_mode: "gate_then_roi"
    min_bet_ratio: 0.05
    min_bets_abs: 100
    max_drawdown: 0.45
    min_final_bankroll: 0.85
  policy_search:
    full:
      blend_weights: [0.2, 0.4]
      min_edges: [0.01, 0.03, 0.05]
      min_probabilities: [0.03, 0.05]
      fractional_kelly_values: [0.25]
      max_fraction_values: [0.02]
      odds_mins: [1.0]
      odds_maxs: [25.0, 40.0]
      top_ks: [1]
      min_expected_values: [1.0, 1.05]

serving:
  policy:
    name: "local_nankan_value_blend_bootstrap_runtime"
    strategy_kind: "portfolio"
    blend_weight: 0.4
    min_prob: 0.05
    odds_min: 1.0
    odds_max: 25.0
    top_k: 1
    min_expected_value: 1.0

output:
  model_dir: "artifacts/models"
  report_dir: "artifacts/reports"
  model_file: "catboost_value_stack_lgbm_roi_high_coverage_tune_roi012_local_nankan_value_blend_bootstrap_model.joblib"
  report_file: "train_metrics_catboost_value_stack_lgbm_roi_high_coverage_tune_roi012_local_nankan_value_blend_bootstrap.json"
  manifest_file: "catboost_value_stack_lgbm_roi_high_coverage_tune_roi012_local_nankan_value_blend_bootstrap_model.manifest.json"
