task: "multi_position"
label: "is_win"

model:
  name: "lightgbm"
  params:
    objective: "binary"
    device_type: "cpu"
    learning_rate: 0.05
    num_leaves: 31
    min_data_in_leaf: 30
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 1
    lambda_l2: 1.0
    n_estimators: 40

training:
  cv: "expanding_window"
  early_stopping_rounds: 10
  max_train_rows: 4000
  max_valid_rows: 1200
  allow_fallback_model: false

evaluation:
  leakage_audit:
    enabled: true
  strategy_constraints:
    max_drawdown: 0.60
    min_final_bankroll: 0.50
    min_bets: 10

output:
  model_dir: "artifacts/models"
  report_dir: "artifacts/reports"
  model_file: "top3_tune_smoke_model.joblib"
  report_file: "top3_tune_smoke_report.json"
