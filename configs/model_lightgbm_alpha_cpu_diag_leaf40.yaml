task: "market_deviation"
label: "is_win"

model:
  name: "lightgbm"
  params:
    objective: "regression"
    device_type: "cpu"
    learning_rate: 0.03
    num_leaves: 64
    min_data_in_leaf: 40
    feature_fraction: 0.8
    bagging_fraction: 0.9
    bagging_freq: 1
    lambda_l2: 2.0
    odds_clip: 30.0
    market_prob_floor: 0.0001
    target_clip: 8.0
    n_estimators: 2500

training:
  cv: "expanding_window"
  early_stopping_rounds: 150
  max_train_rows: 350000
  max_valid_rows: 120000
  allow_fallback_model: false

evaluation:
  leakage_audit:
    enabled: true
  policy:
    selection_mode: "gate_then_roi"
    min_bet_ratio: 0.05
    min_bets_abs: 100
    max_drawdown: 0.45
    min_final_bankroll: 0.85

output:
  model_dir: "artifacts/models"
  report_dir: "artifacts/reports"
  model_file: "lightgbm_alpha_cpu_diag_leaf40_model.joblib"
  report_file: "train_metrics_lightgbm_alpha_cpu_diag_leaf40.json"
  manifest_file: "lightgbm_alpha_cpu_diag_leaf40_model.manifest.json"