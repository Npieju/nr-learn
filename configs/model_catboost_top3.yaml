task: "multi_position"
label: "is_win"

model:
  name: "catboost"
  params:
    loss_function: "Logloss"
    eval_metric: "AUC"
    task_type: "CPU"
    iterations: 380
    learning_rate: 0.035
    depth: 6
    l2_leaf_reg: 5.0
    bootstrap_type: "Bayesian"
    bagging_temperature: 0.8
    random_strength: 1.0
    rsm: 0.85
    max_ctr_complexity: 1
    one_hot_max_size: 6
    used_ram_limit: "12gb"

training:
  cv: "expanding_window"
  early_stopping_rounds: 60
  max_train_rows: 650000
  max_valid_rows: 160000
  allow_fallback_model: false

evaluation:
  leakage_audit:
    enabled: true
  policy:
    selection_mode: "gate_then_roi"
    min_bet_ratio: 0.05
    min_bets_abs: 100
    max_drawdown: 0.45
    min_final_bankroll: 0.85

output:
  model_dir: "artifacts/models"
  report_dir: "artifacts/reports"
  model_file: "catboost_top3_model.joblib"
  report_file: "train_metrics_catboost_top3.json"
  manifest_file: "catboost_top3_model.manifest.json"
