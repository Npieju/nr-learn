task: "ranking"
label: "is_win"

model:
  name: "catboost"
  params:
    loss_function: "QuerySoftMax"
    task_type: "CPU"
    iterations: 550
    learning_rate: 0.03
    depth: 6
    l2_leaf_reg: 6.0
    bootstrap_type: "Bernoulli"
    subsample: 0.85
    random_strength: 1.0
    rsm: 0.85
    max_ctr_complexity: 1
    one_hot_max_size: 6
    used_ram_limit: "12gb"

training:
  cv: "expanding_window"
  early_stopping_rounds: 80
  max_train_rows: 700000
  max_valid_rows: 180000
  allow_fallback_model: false

evaluation:
  leakage_audit:
    enabled: true
  policy:
    selection_mode: "gate_then_roi"
    min_bet_ratio: 0.05
    min_bets_abs: 100
    max_drawdown: 0.45
    min_final_bankroll: 0.85

output:
  model_dir: "artifacts/models"
  report_dir: "artifacts/reports"
  model_file: "catboost_fundamental_strength_no_market_model.joblib"
  report_file: "train_metrics_catboost_fundamental_strength_no_market.json"
  manifest_file: "catboost_fundamental_strength_no_market_model.manifest.json"