task: "classification"
label: "is_win"

model:
  name: "value_blend"
  params:
    probability_path_mode: "support_preserving_residual_path"
    alpha_weight: 0.05
    alpha_scale: 0.5
    roi_weight: 0.12
    roi_scale: 3.0
    market_residual_weight: 0.08
    market_residual_scale: 0.75
    odds_column: "odds"
    alpha_positive_only: true
    roi_positive_only: false

components:
  win: "configs/model_catboost_win_high_coverage_diag.yaml"
  alpha: "configs/model_lightgbm_alpha_cpu_diag_race_norm_component_ref.yaml"
  roi: "configs/model_lightgbm_roi_high_coverage_diag.yaml"

evaluation:
  leakage_audit:
    enabled: true
  policy:
    selection_mode: "gate_then_roi"
    min_bet_ratio: 0.05
    min_bets_abs: 100
    max_drawdown: 0.40
    min_final_bankroll: 0.90
  policy_search:
    full:
      blend_weights: [0.6, 0.8]
      min_edges: [0.0, 0.01]
      min_probabilities: [0.03, 0.05]
      fractional_kelly_values: [0.25]
      max_fraction_values: [0.02]
      odds_mins: [1.0]
      odds_maxs: [25.0]
      top_ks: [1]
      min_expected_values: [0.95, 1.0]
    regime_overrides:
      - name: "early_kelly_bias"
        when:
          valid_end_before: "2024-07-31"
        full:
          blend_weights: [0.8]
          min_edges: [0.0, 0.005]
          min_probabilities: [0.03, 0.04]
          fractional_kelly_values: [0.25]
          max_fraction_values: [0.02]
          odds_mins: [1.0]
          odds_maxs: [25.0]
          top_ks: [1]
          min_expected_values: [999.0]

serving:
  score_calibration:
    enabled: true
    method: "isotonic"
    artifact_suffix: "r20260530_favonly_composite_budget_current_model"
    train_glob: "artifacts/predictions/predictions_*_aug25_support_preserving_calibration_train_{artifact_suffix}.csv"
    label_col: "rank"
    top_popularity_max: 1
    non_top_max_lift: 0.0
    shrinkage: 0.5
    race_closure_mode: "none"
    min_calibration_rows: 100
  policy:
    name: "favonly_composite_budget_candidate"
    strategy_kind: "composite_budget"
    blend_weight: 0.8
    min_prob: 0.0
    odds_min: 1.0
    odds_max: 25.0
    budget_per_date: 3
    min_expected_value: 0.95
    max_popularity: 6
    composite_ev_cap: 1.25
    composite_weights:
      ev: 0.45
      prob: 0.35
      rank: 0.15
      odds_penalty: 0.05
      pop_penalty: 0.05
  policy_regime_overrides:
    - name: "may_runtime_kelly"
      when:
        end_month_in: [5]
      policy:
        strategy_kind: "kelly"
        blend_weight: 0.8
        min_prob: 0.03
        odds_min: 1.0
        odds_max: 25.0
        min_edge: 0.0
        fractional_kelly: 0.25
        max_fraction: 0.02
    - name: "june_runtime_kelly"
      when:
        end_month_in: [6]
      policy:
        strategy_kind: "kelly"
        blend_weight: 0.8
        min_prob: 0.05
        odds_min: 1.0
        odds_max: 25.0
        min_edge: 0.0
        fractional_kelly: 0.25
        max_fraction: 0.02
    - name: "july_runtime_kelly"
      when:
        end_month_in: [7]
      policy:
        strategy_kind: "kelly"
        blend_weight: 0.8
        min_prob: 0.03
        odds_min: 1.0
        odds_max: 25.0
        min_edge: 0.005
        fractional_kelly: 0.25
        max_fraction: 0.02
    - name: "aug_runtime_portfolio"
      when:
        end_month_in: [8]
      policy:
        strategy_kind: "portfolio"
        blend_weight: 0.8
        min_prob: 0.03
        odds_min: 1.0
        odds_max: 25.0
        top_k: 1
        min_expected_value: 0.95

output:
  model_dir: "artifacts/models"
  report_dir: "artifacts/reports"
  model_file: "catboost_value_stack_lgbm_roi_high_coverage_tune_roi012_liquidity_regime_hybrid_june_strict_serving_support_preserving_prob_race_norm_model.joblib"
  report_file: "train_metrics_catboost_value_stack_lgbm_roi_high_coverage_tune_roi012_liquidity_regime_hybrid_june_strict_serving_support_preserving_prob_favonly_composite_budget_revision_scoped.json"
  manifest_file: "catboost_value_stack_lgbm_roi_high_coverage_tune_roi012_liquidity_regime_hybrid_june_strict_serving_support_preserving_prob_race_norm_model.manifest.json"
