crawl:
  base_url: "https://db.netkeiba.com"
  user_agent: "nr-learn-netkeiba-crawler/0.1"
  timeout_sec: 20
  delay_sec: 0.5
  retry_count: 3
  retry_backoff_sec: 2.0
  overwrite: false
  raw_html_dir: "data/external/netkeiba/raw_html"
  manifest_file: "artifacts/reports/netkeiba_crawl_manifest_2025_missing_result.json"
  targets:
    race_result:
      enabled: true
      id_file: "data/external/netkeiba/ids/race_ids_missing_result_2025.csv"
      id_column: "race_id"
      output_file: "data/external/netkeiba/results/netkeiba_race_result_crawled.csv"
      dedupe_on:
        - "race_id"
        - "horse_id"